version: '3.8'

services:
  # PostgreSQL Database
  asset-db:
    image: postgres:15-alpine
    container_name: asset_management_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asset
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - asset_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (optional)
  asset-redis:
    image: redis:7-alpine
    container_name: asset_management_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asset_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Application (Development)
  asset-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset_management_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=asset-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=asset
      - JWT_SECRET=your-super-secret-jwt-key-for-development
      - API_URL=http://localhost:3000
      - REDIS_HOST=asset-redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
      - /app/node_modules
      - logs_data:/app/logs
    networks:
      - asset_network
    depends_on:
      asset-db:
        condition: service_healthy
      asset-redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs_data:
    driver: local

networks:
  asset_network:
    driver: bridge
