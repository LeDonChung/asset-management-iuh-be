version: '3.8'

services:
  # PostgreSQL Database
  asset-db:
    image: postgres:15-alpine
    container_name: asset_management_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-asset}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asset_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-asset}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching
  asset-redis:
    image: redis:7-alpine
    container_name: asset_management_redis_prod
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - asset_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend Application (Production)
  asset-app:
    image: ledonchung/asset-management-iuh-be:latest
    container_name: asset_management_app_prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=asset-db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-asset}
      - JWT_SECRET=${JWT_SECRET}
      - API_URL=${API_URL:-http://localhost:3000}
      - REDIS_HOST=asset-redis
      - REDIS_PORT=${REDIS_PORT:-6379}
    volumes:
      - logs_data:/app/logs
    networks:
      - asset_network
    depends_on:
      asset-db:
        condition: service_healthy
      asset-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs_data:
    driver: local

networks:
  asset_network:
    driver: bridge
